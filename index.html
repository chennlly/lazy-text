<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題一堆資料庫</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f3;
    --bg-card: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #5a5a5a;
    --ink-muted: #9a9a9a;
    --line: #e8e4d8;
    --accent: #c8553d;
    --accent-soft: #f4ddd6;
    --tag-bg: #ede8db;
    --tag-ink: #6b5f3f;
    --highlight: #ffe9a8;
  }
  * { -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Noto Sans TC', system-ui, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(200,85,61,0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(107,95,63,0.05) 0%, transparent 40%);
    color: var(--ink);
    min-height: 100vh;
  }
  .font-display { font-family: 'Noto Serif TC', serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 4px;
    transition: all 0.2s ease;
  }
  .card:hover {
    border-color: #d4cfb8;
    box-shadow: 0 4px 20px -8px rgba(0,0,0,0.08);
  }

  .btn {
    transition: all 0.15s ease;
    font-weight: 500;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--bg);
  }
  .btn-primary:hover { background: var(--accent); }
  .btn-secondary {
    background: var(--bg-card);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover { border-color: var(--ink); }
  .btn-ghost {
    color: var(--ink-soft);
  }
  .btn-ghost:hover { color: var(--accent); }
  .btn-danger:hover { color: #b91c1c; }

  input[type="text"], input[type="search"], textarea {
    background: var(--bg-card);
    border: 1px solid var(--line);
    transition: border-color 0.15s ease;
  }
  input[type="text"]:focus, input[type="search"]:focus, textarea:focus {
    outline: none;
    border-color: var(--ink);
  }

  .tag-chip {
    background: var(--tag-bg);
    color: var(--tag-ink);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 2px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .tag-chip-active {
    background: var(--ink);
    color: var(--bg);
  }
  .tag-chip-removable {
    cursor: pointer;
    background: var(--accent-soft);
    color: var(--accent);
  }
  .tag-chip-removable:hover { background: var(--accent); color: white; }

  .highlight-text {
    background: var(--highlight);
    padding: 0 2px;
    border-radius: 1px;
  }

  .reply-content {
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.7;
    color: var(--ink-soft);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(26,26,26,0.5);
    backdrop-filter: blur(4px);
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: fadeIn 0.15s ease;
  }
  .modal {
    background: var(--bg-card);
    border-radius: 6px;
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .image-preview {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid var(--line);
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .image-preview:hover { transform: scale(1.05); }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px;
    max-width: 400px;
  }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    cursor: zoom-out;
  }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-muted);
  }

  .copy-count-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
  }

  .divider-text {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--ink-muted);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .divider-text::before, .divider-text::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .skeleton {
    background: linear-gradient(90deg, #f0ebe0 0%, #f7f3e8 50%, #f0ebe0 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .scroll-fade {
    mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
  }

  /* 排序 / 過濾按鈕群組 */
  .seg-control {
    display: inline-flex;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 2px;
  }
  .seg-control button {
    padding: 4px 12px;
    font-size: 13px;
    border-radius: 3px;
    color: var(--ink-soft);
    transition: all 0.15s ease;
  }
  .seg-control button.active {
    background: var(--ink);
    color: var(--bg);
  }

  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] .details-arrow { transform: rotate(90deg); }
  .details-arrow { transition: transform 0.15s ease; display: inline-block; }
</style>
</head>
<body>

<!-- Header -->
<header class="border-b" style="border-color: var(--line);">
  <div class="max-w-5xl mx-auto px-6 py-6 flex items-center justify-between">
    <div>
      <h1 class="font-display text-3xl font-semibold tracking-tight">
        問題一堆<span style="color: var(--accent);">．</span>資料庫
      </h1>
      <p class="text-sm mt-1" style="color: var(--ink-muted);">
        客服罐頭訊息收納所 <span class="font-mono">·</span> Canned Replies Vault
      </p>
    </div>
    <button id="addBtn" class="btn btn-primary px-4 py-2 rounded text-sm flex items-center gap-2">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      新增資料
    </button>
  </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-8">

  <!-- 搜尋區 -->
  <div class="mb-6">
    <div class="relative">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--ink-muted);">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
      <input
        type="search"
        id="searchInput"
        placeholder="搜尋標題、內容、標籤……例如：曝光爛、CPM、Meta"
        class="w-full pl-12 pr-4 py-3 rounded text-base"
      />
    </div>

    <!-- 標籤過濾條 -->
    <div class="mt-4 flex items-start gap-3 flex-wrap">
      <span class="text-xs font-medium pt-1" style="color: var(--ink-muted); letter-spacing: 0.1em;">TAGS</span>
      <div id="tagFilters" class="flex gap-2 flex-wrap flex-1"></div>
    </div>

    <!-- 排序 / 統計列 -->
    <div class="mt-4 flex items-center justify-between">
      <div class="text-sm" style="color: var(--ink-muted);">
        共 <span id="totalCount" class="font-mono font-medium" style="color: var(--ink);">0</span> 筆資料
        <span id="filteredHint"></span>
      </div>
      <div class="seg-control">
        <button data-sort="recent" class="active">最近新增</button>
        <button data-sort="popular">最常複製</button>
        <button data-sort="alpha">標題排序</button>
      </div>
    </div>
  </div>

  <!-- 卡片列表 -->
  <div id="repliesList" class="space-y-4"></div>

  <div id="loadingState" class="space-y-4">
    <div class="skeleton h-32"></div>
    <div class="skeleton h-32"></div>
  </div>

  <div id="emptyState" class="empty-state hidden">
    <div class="font-display text-2xl mb-2" style="color: var(--ink-soft);">空無一物</div>
    <div class="text-sm">點右上角「新增資料」開始建立你的罐頭訊息收藏</div>
  </div>

  <div id="noResultsState" class="empty-state hidden">
    <div class="font-display text-2xl mb-2" style="color: var(--ink-soft);">查無結果</div>
    <div class="text-sm">試試其他關鍵字，或清除標籤過濾條件</div>
  </div>

</main>

<!-- 頁尾 -->
<footer class="border-t mt-16" style="border-color: var(--line);">
  <div class="max-w-5xl mx-auto px-6 py-6 flex items-center justify-between text-xs" style="color: var(--ink-muted);">
    <div>
      Powered by <span class="font-mono">Supabase</span> · 資料即時雲端同步
    </div>
    <button id="exportBtn" class="btn-ghost btn flex items-center gap-1.5">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
      </svg>
      匯出 JSON 備份
    </button>
  </div>
</footer>

<!-- 新增 / 編輯 Modal -->
<div id="editModal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="px-6 py-5 border-b flex items-center justify-between" style="border-color: var(--line);">
      <h2 id="modalTitle" class="font-display text-xl font-semibold">新增罐頭訊息</h2>
      <button id="closeModal" class="btn-ghost btn p-1">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="px-6 py-5 space-y-5">
      <div>
        <label class="block text-xs font-medium mb-2" style="color: var(--ink-soft); letter-spacing: 0.05em;">
          標題（關鍵字）<span style="color: var(--accent);">*</span>
        </label>
        <input
          type="text"
          id="inputTitle"
          placeholder="例如：投互動目標 曝光爛CPM爛"
          class="w-full px-3 py-2 rounded"
        />
      </div>

      <div>
        <label class="block text-xs font-medium mb-2" style="color: var(--ink-soft); letter-spacing: 0.05em;">
          回覆內容 <span style="color: var(--accent);">*</span>
        </label>
        <textarea
          id="inputContent"
          rows="8"
          placeholder="貼上你的罐頭回覆內容……"
          class="w-full px-3 py-2 rounded resize-y"
        ></textarea>
      </div>

      <div>
        <label class="block text-xs font-medium mb-2" style="color: var(--ink-soft); letter-spacing: 0.05em;">
          標籤（按 Enter 新增）
        </label>
        <input
          type="text"
          id="inputTagField"
          placeholder="例如：Meta、互動目標、CPM"
          class="w-full px-3 py-2 rounded mb-2"
        />
        <div id="inputTags" class="flex gap-2 flex-wrap"></div>
      </div>

      <div>
        <label class="block text-xs font-medium mb-2" style="color: var(--ink-soft); letter-spacing: 0.05em;">
          附加圖片（可多張）
        </label>
        <input
          type="file"
          id="inputImages"
          accept="image/*"
          multiple
          class="text-sm w-full"
        />
        <div id="imagePreviewArea" class="image-grid mt-3"></div>
      </div>
    </div>

    <div class="px-6 py-4 border-t flex items-center justify-between" style="border-color: var(--line); background: #faf8f3;">
      <div id="uploadStatus" class="text-xs" style="color: var(--ink-muted);"></div>
      <div class="flex gap-2">
        <button id="cancelBtn" class="btn btn-secondary px-4 py-2 rounded text-sm">取消</button>
        <button id="saveBtn" class="btn btn-primary px-4 py-2 rounded text-sm">儲存</button>
      </div>
    </div>
  </div>
</div>

<!-- 刪除確認 Modal -->
<div id="confirmModal" class="modal-backdrop hidden">
  <div class="modal" style="max-width: 400px;">
    <div class="p-6">
      <h3 class="font-display text-lg font-semibold mb-2">確定要刪除嗎？</h3>
      <p class="text-sm mb-5" style="color: var(--ink-soft);">
        將永久刪除「<span id="confirmTitle" class="font-medium" style="color: var(--ink);"></span>」，無法還原。
      </p>
      <div class="flex justify-end gap-2">
        <button id="confirmCancel" class="btn btn-secondary px-4 py-2 rounded text-sm">取消</button>
        <button id="confirmDelete" class="btn px-4 py-2 rounded text-sm" style="background: #b91c1c; color: white;">確認刪除</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
// ========== Supabase 設定 ==========
const SUPABASE_URL = 'https://lutpelywqfggytutsjfd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1dHBlbHl3cWZnZ3l0dXRzamZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NjU5MjIsImV4cCI6MjA5MzU0MTkyMn0.usacOZumU4MN6SyPRb8Rs--2hiqYWVcBXcQRn6843h8';
const STORAGE_BUCKET = 'reply-images';

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ========== 全域狀態 ==========
let allReplies = [];
let activeTagFilters = new Set();
let currentSort = 'recent';
let editingId = null;
let pendingTags = [];
let pendingImages = []; // { file, previewUrl, uploadedUrl }
let pendingDeleteId = null;

// ========== DOM 元素 ==========
const $ = id => document.getElementById(id);
const repliesList = $('repliesList');
const searchInput = $('searchInput');
const tagFilters = $('tagFilters');
const totalCount = $('totalCount');
const filteredHint = $('filteredHint');
const loadingState = $('loadingState');
const emptyState = $('emptyState');
const noResultsState = $('noResultsState');

// ========== 工具函式 ==========
const showToast = (msg, type = 'success') => {
  const toast = $('toast');
  toast.textContent = msg;
  toast.style.background = type === 'error' ? '#b91c1c' : 'var(--ink)';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
};

const escapeHtml = (str) => {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
};

const highlightMatch = (text, query) => {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const safeQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(safeQuery, 'gi'), m => `<span class="highlight-text">${m}</span>`);
};

const formatDate = (iso) => {
  const d = new Date(iso);
  const now = new Date();
  const diffDays = Math.floor((now - d) / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return '今天';
  if (diffDays === 1) return '昨天';
  if (diffDays < 7) return `${diffDays} 天前`;
  return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
};

// ========== 資料讀取 ==========
async function loadReplies() {
  loadingState.classList.remove('hidden');
  repliesList.innerHTML = '';

  const { data, error } = await db
    .from('replies')
    .select('*')
    .order('created_at', { ascending: false });

  loadingState.classList.add('hidden');

  if (error) {
    showToast('資料載入失敗：' + error.message, 'error');
    console.error(error);
    return;
  }

  allReplies = data || [];
  render();
}

// ========== 渲染 ==========
function render() {
  totalCount.textContent = allReplies.length;

  // 渲染標籤過濾條
  renderTagFilters();

  if (allReplies.length === 0) {
    emptyState.classList.remove('hidden');
    noResultsState.classList.add('hidden');
    repliesList.innerHTML = '';
    filteredHint.textContent = '';
    return;
  }
  emptyState.classList.add('hidden');

  // 過濾 + 排序
  const query = searchInput.value.trim().toLowerCase();
  let filtered = allReplies.filter(r => {
    // 標籤過濾（AND 邏輯）
    if (activeTagFilters.size > 0) {
      const replyTags = (r.tags || []).map(t => t.toLowerCase());
      for (const t of activeTagFilters) {
        if (!replyTags.includes(t.toLowerCase())) return false;
      }
    }
    // 關鍵字搜尋
    if (query) {
      const haystack = [
        r.title,
        r.content,
        ...(r.tags || [])
      ].join(' ').toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  // 排序
  if (currentSort === 'popular') {
    filtered.sort((a, b) => (b.copy_count || 0) - (a.copy_count || 0));
  } else if (currentSort === 'alpha') {
    filtered.sort((a, b) => a.title.localeCompare(b.title, 'zh-Hant'));
  } else {
    filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  }

  filteredHint.textContent = (filtered.length !== allReplies.length)
    ? `（過濾後 ${filtered.length} 筆）` : '';

  if (filtered.length === 0) {
    noResultsState.classList.remove('hidden');
    repliesList.innerHTML = '';
    return;
  }
  noResultsState.classList.add('hidden');

  repliesList.innerHTML = filtered.map(r => renderCard(r, query)).join('');
  attachCardEvents();
}

function renderTagFilters() {
  const tagSet = new Map(); // tag -> count
  allReplies.forEach(r => {
    (r.tags || []).forEach(t => {
      tagSet.set(t, (tagSet.get(t) || 0) + 1);
    });
  });

  if (tagSet.size === 0) {
    tagFilters.innerHTML = '<span class="text-xs" style="color: var(--ink-muted);">尚無標籤</span>';
    return;
  }

  const sorted = [...tagSet.entries()].sort((a, b) => b[1] - a[1]);
  tagFilters.innerHTML = sorted.map(([tag, count]) => {
    const active = activeTagFilters.has(tag);
    return `<button class="tag-chip ${active ? 'tag-chip-active' : ''}" data-tag="${escapeHtml(tag)}">
      ${escapeHtml(tag)} <span style="opacity:0.6;">${count}</span>
    </button>`;
  }).join('');

  if (activeTagFilters.size > 0) {
    tagFilters.innerHTML += `<button id="clearFilters" class="text-xs underline ml-2" style="color: var(--accent);">清除過濾</button>`;
  }

  tagFilters.querySelectorAll('button[data-tag]').forEach(btn => {
    btn.onclick = () => {
      const tag = btn.dataset.tag;
      if (activeTagFilters.has(tag)) activeTagFilters.delete(tag);
      else activeTagFilters.add(tag);
      render();
    };
  });

  const clearBtn = $('clearFilters');
  if (clearBtn) clearBtn.onclick = () => {
    activeTagFilters.clear();
    render();
  };
}

function renderCard(r, query) {
  const tagsHtml = (r.tags || []).map(t =>
    `<span class="tag-chip">${escapeHtml(t)}</span>`
  ).join('');

  const imagesHtml = (r.image_urls && r.image_urls.length)
    ? `<div class="image-grid mt-3">
        ${r.image_urls.map(url => `<img src="${escapeHtml(url)}" class="image-preview" data-lightbox="${escapeHtml(url)}" alt="附圖">`).join('')}
      </div>`
    : '';

  return `
    <article class="card p-5" data-id="${r.id}">
      <div class="flex items-start justify-between gap-4 mb-3">
        <h3 class="font-display text-lg font-semibold leading-snug flex-1">
          ${highlightMatch(r.title, query)}
        </h3>
        <div class="flex items-center gap-1 shrink-0">
          ${(r.copy_count || 0) > 0 ? `<span class="copy-count-badge mr-2" title="已被複製 ${r.copy_count} 次">↗ ${r.copy_count}</span>` : ''}
          <button class="btn btn-ghost p-1.5" data-action="edit" title="編輯">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="btn btn-ghost btn-danger p-1.5" data-action="delete" title="刪除">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
      </div>

      ${tagsHtml ? `<div class="flex gap-1.5 flex-wrap mb-3">${tagsHtml}</div>` : ''}

      <div class="reply-content text-sm">${highlightMatch(r.content, query)}</div>

      ${imagesHtml}

      <div class="flex items-center justify-between mt-4 pt-3 border-t" style="border-color: var(--line);">
        <span class="text-xs" style="color: var(--ink-muted);">${formatDate(r.created_at)}</span>
        <button class="btn btn-secondary px-3 py-1.5 rounded text-xs flex items-center gap-1.5" data-action="copy">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          一鍵複製
        </button>
      </div>
    </article>
  `;
}

function attachCardEvents() {
  repliesList.querySelectorAll('article').forEach(card => {
    const id = card.dataset.id;
    card.querySelector('[data-action="copy"]').onclick = () => copyReply(id);
    card.querySelector('[data-action="edit"]').onclick = () => openEditModal(id);
    card.querySelector('[data-action="delete"]').onclick = () => askDelete(id);
    card.querySelectorAll('[data-lightbox]').forEach(img => {
      img.onclick = () => openLightbox(img.dataset.lightbox);
    });
  });
}

// ========== 複製 ==========
async function copyReply(id) {
  const reply = allReplies.find(r => r.id === id);
  if (!reply) return;
  try {
    await navigator.clipboard.writeText(reply.content);
    showToast('已複製到剪貼簿');
    // 更新計數
    const newCount = (reply.copy_count || 0) + 1;
    const { error } = await db
      .from('replies')
      .update({ copy_count: newCount })
      .eq('id', id);
    if (!error) {
      reply.copy_count = newCount;
      render();
    }
  } catch (e) {
    showToast('複製失敗：' + e.message, 'error');
  }
}

// ========== 新增 / 編輯 Modal ==========
function openAddModal() {
  editingId = null;
  $('modalTitle').textContent = '新增罐頭訊息';
  $('inputTitle').value = '';
  $('inputContent').value = '';
  $('inputTagField').value = '';
  $('inputImages').value = '';
  pendingTags = [];
  pendingImages = [];
  renderPendingTags();
  renderPendingImages();
  $('uploadStatus').textContent = '';
  $('editModal').classList.remove('hidden');
  setTimeout(() => $('inputTitle').focus(), 50);
}

function openEditModal(id) {
  const r = allReplies.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  $('modalTitle').textContent = '編輯罐頭訊息';
  $('inputTitle').value = r.title;
  $('inputContent').value = r.content;
  $('inputTagField').value = '';
  $('inputImages').value = '';
  pendingTags = [...(r.tags || [])];
  pendingImages = (r.image_urls || []).map(url => ({ uploadedUrl: url, previewUrl: url }));
  renderPendingTags();
  renderPendingImages();
  $('uploadStatus').textContent = '';
  $('editModal').classList.remove('hidden');
  setTimeout(() => $('inputTitle').focus(), 50);
}

function closeModal() {
  $('editModal').classList.add('hidden');
  // 釋放 object URL
  pendingImages.forEach(img => {
    if (img.previewUrl && img.previewUrl.startsWith('blob:')) {
      URL.revokeObjectURL(img.previewUrl);
    }
  });
  pendingImages = [];
  editingId = null;
}

function renderPendingTags() {
  const container = $('inputTags');
  if (pendingTags.length === 0) {
    container.innerHTML = '<span class="text-xs" style="color: var(--ink-muted);">尚未加入標籤</span>';
    return;
  }
  container.innerHTML = pendingTags.map((t, i) =>
    `<span class="tag-chip tag-chip-removable" data-idx="${i}">
      ${escapeHtml(t)} <span style="margin-left:4px;">×</span>
    </span>`
  ).join('');
  container.querySelectorAll('[data-idx]').forEach(el => {
    el.onclick = () => {
      pendingTags.splice(parseInt(el.dataset.idx), 1);
      renderPendingTags();
    };
  });
}

function renderPendingImages() {
  const container = $('imagePreviewArea');
  if (pendingImages.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = pendingImages.map((img, i) => `
    <div style="position:relative;">
      <img src="${escapeHtml(img.previewUrl)}" class="image-preview">
      <button data-rmimg="${i}" style="position:absolute;top:-6px;right:-6px;background:#b91c1c;color:white;border-radius:50%;width:20px;height:20px;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;">×</button>
    </div>
  `).join('');
  container.querySelectorAll('[data-rmimg]').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.rmimg);
      const removed = pendingImages.splice(idx, 1)[0];
      if (removed.previewUrl && removed.previewUrl.startsWith('blob:')) {
        URL.revokeObjectURL(removed.previewUrl);
      }
      renderPendingImages();
    };
  });
}

$('inputTagField').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ',' || e.key === '、') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/[,，、]/g, '');
    if (val && !pendingTags.includes(val)) {
      pendingTags.push(val);
      renderPendingTags();
    }
    e.target.value = '';
  }
});

$('inputImages').addEventListener('change', (e) => {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    pendingImages.push({
      file,
      previewUrl: URL.createObjectURL(file),
      uploadedUrl: null
    });
  });
  renderPendingImages();
  e.target.value = '';
});

// ========== 儲存 ==========
$('saveBtn').addEventListener('click', async () => {
  const title = $('inputTitle').value.trim();
  const content = $('inputContent').value.trim();
  if (!title || !content) {
    showToast('標題與內容不能空白', 'error');
    return;
  }

  $('saveBtn').disabled = true;
  $('saveBtn').textContent = '儲存中…';

  try {
    // 上傳尚未上傳的圖片
    const uploadedUrls = [];
    for (let i = 0; i < pendingImages.length; i++) {
      const img = pendingImages[i];
      if (img.uploadedUrl) {
        uploadedUrls.push(img.uploadedUrl);
        continue;
      }
      $('uploadStatus').textContent = `上傳圖片 ${i + 1}/${pendingImages.length}…`;
      const ext = img.file.name.split('.').pop();
      const fileName = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}.${ext}`;
      const { error: upErr } = await db.storage
        .from(STORAGE_BUCKET)
        .upload(fileName, img.file);
      if (upErr) throw upErr;
      const { data: urlData } = db.storage
        .from(STORAGE_BUCKET)
        .getPublicUrl(fileName);
      uploadedUrls.push(urlData.publicUrl);
    }
    $('uploadStatus').textContent = '';

    const payload = {
      title,
      content,
      tags: pendingTags,
      image_urls: uploadedUrls,
      updated_at: new Date().toISOString()
    };

    if (editingId) {
      const { error } = await db.from('replies').update(payload).eq('id', editingId);
      if (error) throw error;
      showToast('已更新');
    } else {
      const { error } = await db.from('replies').insert([payload]);
      if (error) throw error;
      showToast('已新增');
    }

    closeModal();
    await loadReplies();
  } catch (e) {
    console.error(e);
    showToast('儲存失敗：' + e.message, 'error');
  } finally {
    $('saveBtn').disabled = false;
    $('saveBtn').textContent = '儲存';
  }
});

// ========== 刪除 ==========
function askDelete(id) {
  const r = allReplies.find(x => x.id === id);
  if (!r) return;
  pendingDeleteId = id;
  $('confirmTitle').textContent = r.title;
  $('confirmModal').classList.remove('hidden');
}

$('confirmCancel').addEventListener('click', () => {
  $('confirmModal').classList.add('hidden');
  pendingDeleteId = null;
});

$('confirmDelete').addEventListener('click', async () => {
  if (!pendingDeleteId) return;
  const { error } = await db.from('replies').delete().eq('id', pendingDeleteId);
  if (error) {
    showToast('刪除失敗：' + error.message, 'error');
    return;
  }
  showToast('已刪除');
  $('confirmModal').classList.add('hidden');
  pendingDeleteId = null;
  await loadReplies();
});

// ========== Lightbox ==========
function openLightbox(url) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${escapeHtml(url)}">`;
  lb.onclick = () => lb.remove();
  document.body.appendChild(lb);
}

// ========== 匯出 ==========
$('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(allReplies, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const today = new Date().toISOString().split('T')[0];
  a.download = `canned-replies-${today}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('已匯出 JSON 備份');
});

// ========== 事件綁定 ==========
$('addBtn').addEventListener('click', openAddModal);
$('closeModal').addEventListener('click', closeModal);
$('cancelBtn').addEventListener('click', closeModal);
$('editModal').addEventListener('click', (e) => {
  if (e.target === $('editModal')) closeModal();
});

searchInput.addEventListener('input', () => render());

document.querySelectorAll('.seg-control button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.seg-control button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    render();
  });
});

// 鍵盤快捷鍵
document.addEventListener('keydown', (e) => {
  // Cmd/Ctrl + K = 聚焦搜尋
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
  // Cmd/Ctrl + N = 新增
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    openAddModal();
  }
  // Esc = 關閉 modal
  if (e.key === 'Escape') {
    if (!$('editModal').classList.contains('hidden')) closeModal();
    if (!$('confirmModal').classList.contains('hidden')) {
      $('confirmModal').classList.add('hidden');
      pendingDeleteId = null;
    }
  }
});

// ========== 啟動 ==========
loadReplies();
</script>
</body>
</html>
